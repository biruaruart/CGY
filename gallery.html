<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biru Gallery</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0f0e;
    --surface: #111a18;
    --surface2: #182420;
    --border: #1e3330;
    --accent: #2dd4bf;
    --accent2: #e8633a;
    --accent3: #5eead4;
    --text: #e0f2f0;
    --text-dim: #6b9e98;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    padding: 24px 20px;
  }

  /* ── 分類頁籤 ── */
  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .tab-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 16px;
    font-size: 12px;
    font-family: 'Noto Sans TC', sans-serif;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.2s;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }

  .tab-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .tab-btn.active {
    background: linear-gradient(135deg, #0d3d36, #1a2e20);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── 主體區 ── */
  .viewer {
    display: grid;
    grid-template-columns: 1fr 280px;
    grid-template-rows: auto auto;
    gap: 12px;
  }

  /* 左：大圖 */
  .main-image-wrap {
    grid-column: 1;
    grid-row: 1;
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    aspect-ratio: 1 / 1;
    overflow: hidden;
    cursor: zoom-in;
  }

  .main-image-wrap::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 60%, rgba(45,212,191,0.06));
    z-index: 1;
    pointer-events: none;
  }

  .corner {
    position: absolute;
    width: 14px; height: 14px;
    border-color: var(--accent);
    border-style: solid;
    z-index: 2;
    opacity: 0.6;
  }
  .corner.tl { top: 8px; left: 8px; border-width: 1px 0 0 1px; }
  .corner.tr { top: 8px; right: 8px; border-width: 1px 1px 0 0; }
  .corner.bl { bottom: 8px; left: 8px; border-width: 0 0 1px 1px; }
  .corner.br { bottom: 8px; right: 8px; border-width: 0 1px 1px 0; }

  .main-image-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.4s ease;
  }

  .main-image-wrap:hover img { transform: scale(1.03); }

  .zoom-hint {
    position: absolute;
    bottom: 10px; right: 10px;
    background: rgba(0,0,0,0.6);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 10px;
    padding: 3px 8px;
    letter-spacing: 0.1em;
    z-index: 2;
  }

  /* ── 左右箭頭 ── */
  .nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.45);
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 28px; height: 48px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    z-index: 3;
    transition: all 0.2s;
    font-size: 14px;
    user-select: none;
  }
  .nav-btn:hover {
    background: rgba(45,212,191,0.15);
    border-color: var(--accent);
    color: var(--accent);
  }
  .nav-btn.prev { left: 0; }
  .nav-btn.next { right: 0; }
  .nav-btn.hidden { opacity: 0; pointer-events: none; }

  /* 右：說明 */
  .info-panel {
    grid-column: 2;
    grid-row: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    position: relative;
    overflow: hidden;
  }

  .info-panel::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 2px; height: 100%;
    background: linear-gradient(to bottom, var(--accent), transparent);
  }

  .info-category {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .info-title {
    font-family: 'Cinzel', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.4;
    border-bottom: 1px solid var(--border);
    padding-bottom: 12px;
  }

  .info-price {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .price-label {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
  }

  .price-value {
    font-size: 18px;
    color: var(--accent2);
    font-weight: 500;
  }

  .info-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: auto;
  }

  .tag {
    font-size: 10px;
    padding: 3px 10px;
    border: 1px solid var(--border);
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }

  .tag.highlight {
    border-color: var(--accent);
    color: var(--accent);
  }

  .info-desc {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.7;
    border-top: 1px solid var(--border);
    padding-top: 12px;
    white-space: pre-line;
  }

  /* 下：縮圖列 */
  .thumbnails {
    grid-column: 1;
    grid-row: 2;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .thumb {
    width: 72px; height: 72px;
    border: 1px solid var(--border);
    overflow: hidden;
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
    transition: border-color 0.2s;
  }

  .thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.3s;
    filter: brightness(0.75);
  }

  .thumb:hover img { transform: scale(1.08); filter: brightness(1); }

  .thumb.active {
    border-color: var(--accent);
  }

  .thumb.active img { filter: brightness(1); }

  .thumb.active::after {
    content: '';
    position: absolute;
    inset: 0;
    border: 2px solid var(--accent);
    pointer-events: none;
  }

  /* ── Lightbox ── */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 100;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
  }

  .lightbox.open { display: flex; }

  .lightbox img {
    max-width: 90vw;
    max-height: 90vh;
    object-fit: contain;
    border: 1px solid var(--border);
  }

  .lightbox-close {
    position: fixed;
    top: 20px; right: 24px;
    font-size: 24px;
    color: var(--text-dim);
    cursor: pointer;
    z-index: 101;
    transition: color 0.2s;
  }

  .lightbox-close:hover { color: var(--accent); }

  /* ── 響應式 ── */
  @media (max-width: 640px) {
    .viewer { grid-template-columns: 1fr; }
    .info-panel { grid-column: 1; grid-row: 2; }
    .thumbnails { grid-row: 3; }
  }
</style>
</head>
<body>

<!-- 分類頁籤 -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchCategory('illustration')">插畫委託</button>
  <button class="tab-btn" onclick="switchCategory('doodle')">塗鴉</button>
  <button class="tab-btn" onclick="switchCategory('light')">小品插畫</button>
  <button class="tab-btn" onclick="switchCategory('charaD')">角色設計</button>
  <button class="tab-btn" onclick="switchCategory('sur')">新藝術驚喜包</button>
  <button class="tab-btn" onclick="switchCategory('surf')">花卉驚喜包</button>
  <button class="tab-btn" onclick="switchCategory('pixel')">點陣驚喜包</button>
  <button class="tab-btn" onclick="switchCategory('chibi')">Q版</button>
  <button class="tab-btn" onclick="switchCategory('lineA')">線稿</button>
</div>

<!-- 主檢視區 -->
<div class="viewer">
  <div class="main-image-wrap">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="nav-btn prev" id="prevBtn" onclick="navigate(-1)">‹</div>
    <img id="mainImg" src="" alt="主圖" onclick="openLightbox()" style="cursor:zoom-in;">
    <div class="nav-btn next" id="nextBtn" onclick="navigate(1)">›</div>
    <div class="zoom-hint">CLICK TO ZOOM</div>
  </div>

  <div class="info-panel">
    <div class="info-category" id="infoCategory">ILLUSTRATION</div>
    <div class="info-title" id="infoTitle">幻想印象派</div>
    <div class="info-price">
      <div class="price-label">PRICE FROM</div>
      <div class="price-value" id="infoPrice">NTD. 1,500</div>
    </div>
    <div class="info-desc" id="infoDesc">厚塗油畫感插畫，色彩豐富，偏灰調。作畫時間約 3 週～1 個月。</div>
    <div class="info-tags" id="infoTags"></div>
  </div>

  <div class="thumbnails" id="thumbnails"></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <div class="lightbox-close" onclick="closeLightbox()">✕</div>
  <img id="lightboxImg" src="" alt="放大圖">
</div>

<script>
const BASE = 'https://biruaruart.github.io/CGY/';

// ★ 格式說明：
//   每張圖片可以有自己的 tags
//   { src: '圖片路徑', tags: [{ text: '標籤', h: true/false }] }
//   h: true  → 亮起（橘色）
//   h: false → 不亮（暗色）

const categories = {
  illustration: {
    label: 'ILLUSTRATION',
    title: '幻想印象派',
    price: 'NTD. 1,500～2,500',
    desc: '厚塗油畫感插畫，色彩豐富，偏灰調。\n作畫時間約 3 週～1 個月。',
    images: [
      { src: BASE+'ill_01.jpg', tags: [{ text: '頭像', h: true }, { text: '委託', h: false }] },
      { src: BASE+'ill_02.jpg', tags: [{ text: '半身', h: true }, { text: '委託', h: false }] },
      { src: BASE+'ill_03.png', tags: [{ text: '全身', h: true }, { text: '委託', h: false }] },
      { src: BASE+'ill_04.jpg', tags: [{ text: '頭像', h: true }, { text: '委託', h: false }] },
      { src: BASE+'ill_05.jpg', tags: [{ text: '半身', h: true }, { text: '委託', h: false }] },
      { src: BASE+'ill_06.jpg', tags: [{ text: '全身', h: true }, { text: '委託', h: false }] },
    ]
  },
  doodle: {
    label: 'DOODLE',
    title: '塗鴉',
    price: 'NTD. 400',
    desc: '隨性筆觸，依照設定給我的心理感受繪製。\n無法更改任何項目。\n作畫時間約 1～2 週。',
    images: [
      { src: BASE+'doo_01.jpg', tags: [{ text: '單人', h: true }] },
      { src: BASE+'doo_02.jpg', tags: [{ text: '單人', h: true }] },
      { src: BASE+'doo_03.jpg', tags: [{ text: '滿板', h: true }] },
    ]
  },
  light: {
    label: 'LIGHT ILLUST',
    title: '小品插畫',
    price: 'NTD. 600～800',
    desc: '有構圖、有氛圍，完成度較高的輕量委託。\n可給主題或元素，其餘由畫師自由發揮。\n作畫時間約 1～2 週。',
    images: [
      { src: BASE+'light_01.jpg', tags: [{ text: '單人', h: true }, { text: '氛圍感', h: false }] },
      { src: BASE+'light_02.jpg', tags: [{ text: '單人', h: true }, { text: '氛圍感', h: false }] },
      { src: BASE+'light_03.jpg', tags: [{ text: '滿板', h: true }, { text: '氛圍感', h: false }] },
      { src: BASE+'light_04.jpg', tags: [{ text: '單人', h: true }, { text: '氛圍感', h: false }] },
      { src: BASE+'light_05.jpg', tags: [{ text: '滿板', h: true }, { text: '氛圍感', h: false }] },
    ]
  },
  charaD: {
    label: 'CHARACTER DESIGN',
    title: '角色設計',
    price: 'NTD. 3,000～5,000',
    desc: '需提供基本設定。\n包含正面、背面、表情x3、胸像、色票。\n作畫時間約 1 個月。',
    images: [
      { src: BASE+'charaD_01.jpg', tags: [{ text: '角色外觀', h: true }, { text: '設定包', h: false }] },
    ]
  },
  sur: {
    label: 'ART NOUVEAU BOX',
    title: '新藝術驚喜包',
    price: 'NTD. 1,000～2,000',
    desc: '需提供角色設定與故事。\n皆有背景、框飾、花卉，可選擇是否放上名字。\n作畫時間約 1 個月。',
    images: [
      { src: BASE+'sur_01.png', tags: [{ text: '頭像', h: true }, { text: '自由發揮', h: false }] },
      { src: BASE+'sur_02.png', tags: [{ text: '半身', h: true }, { text: '自由發揮', h: false }] },
    ]
  },
  surf: {
    label: 'FLORAL BOX',
    title: '花卉驚喜包',
    price: 'NTD. 1,000',
    desc: '花卉為主題的驚喜包。\n需提供角色設定，其餘由畫師自由發揮。\n作畫時間約 1 個月。',
    images: [
      { src: BASE+'surf_01.png', tags: [{ text: '花卉', h: true }, { text: '自由發揮', h: false }] },
      { src: BASE+'surf_02.png', tags: [{ text: '花卉', h: true }, { text: '自由發揮', h: false }] },
      { src: BASE+'surf_03.png', tags: [{ text: '花卉', h: true }, { text: '自由發揮', h: false }] },
      { src: BASE+'surf_04.png', tags: [{ text: '花卉', h: true }, { text: '自由發揮', h: false }] },
    ]
  },
  pixel: {
    label: 'PIXEL ART',
    title: '點陣驚喜包',
    price: 'NTD. 450',
    desc: '名牌、塔羅、紋樣。\n請參考各版型。\n作畫時間約 2 週。',
    images: [
      { src: BASE+'pixel_01.jpg', tags: [{ text: '名牌', h: true }] },
      { src: BASE+'pixel_02.jpg', tags: [{ text: '塔羅', h: true }] },
      { src: BASE+'pixel_03.jpg', tags: [{ text: '紋樣', h: true }] },
      { src: BASE+'pixel_04.jpg', tags: [{ text: '名牌', h: true }] },
    ]
  },
  chibi: {
    label: 'CHIBI / Q版',
    title: 'Q版插畫',
    price: 'NTD. 600～1,200',
    desc: 'Q版風格插畫。\n作畫時間約 1～2 週。',
    images: [
      { src: BASE+'chibi_01.jpg', tags: [{ text: 'Q版', h: true }] },
      { src: BASE+'chibi_02.jpg', tags: [{ text: 'Q版', h: true }] },
      { src: BASE+'chibi_03.jpg', tags: [{ text: 'Q版', h: true }] },
      { src: BASE+'chibi_04.jpg', tags: [{ text: 'Q版', h: true }] },
    ]
  },
  lineA: {
    label: 'LINE ART',
    title: '線稿',
    price: '依需求訂定',
    desc: '線稿委託，詳情請來信洽詢。',
    images: [
      { src: BASE+'lineA_01.jpg', tags: [{ text: '線稿', h: true }] },
    ]
  },
};

let currentCategory = 'illustration';
let currentIndex = 0;

function switchCategory(cat) {
  currentCategory = cat;
  currentIndex = 0;
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', Object.keys(categories)[i] === cat);
  });
  render();
}

function navigate(dir) {
  const imgs = categories[currentCategory].images;
  currentIndex = (currentIndex + dir + imgs.length) % imgs.length;
  render();
}

function render() {
  const data = categories[currentCategory];
  const imgs = data.images;
  const current = imgs[currentIndex];

  document.getElementById('mainImg').src = current.src;
  document.getElementById('infoCategory').textContent = data.label;
  document.getElementById('infoTitle').textContent = data.title;
  document.getElementById('infoPrice').textContent = data.price;
  document.getElementById('infoDesc').textContent = data.desc;

  // 箭頭顯示
  document.getElementById('prevBtn').classList.toggle('hidden', imgs.length <= 1);
  document.getElementById('nextBtn').classList.toggle('hidden', imgs.length <= 1);

  // tags：每張圖片各自的 tags
  const tagsEl = document.getElementById('infoTags');
  tagsEl.innerHTML = current.tags.map(t =>
    `<span class="tag ${t.h ? 'highlight' : ''}">${t.text}</span>`
  ).join('');

  // 縮圖
  const thumbsEl = document.getElementById('thumbnails');
  thumbsEl.innerHTML = imgs.map((img, i) =>
    `<div class="thumb ${i === currentIndex ? 'active' : ''}" onclick="selectThumb(${i})">
      <img src="${img.src}" alt="縮圖${i+1}">
    </div>`
  ).join('');
}

function selectThumb(i) {
  currentIndex = i;
  render();
}

function openLightbox() {
  const src = categories[currentCategory].images[currentIndex].src;
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

render();
</script>
</body>
</html>
